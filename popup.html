<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    
    h1 {
      font-size: 16px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .toggle-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s;
    }
    
    .toggle-button:hover {
      background: #45a049;
    }
    
    .toggle-button.disabled {
      background: #f44336;
    }
    
    .toggle-button.disabled:hover {
      background: #da190b;
    }
    
    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>💀 Designer Nightmare Mode</h1>
  <button id="toggleButton" class="toggle-button">Enable Comic Sans</button>
  <div id="status" class="status">Comic Sans is OFF</div>
  
  <script src="popup.js"></script>
</body>
</html>
